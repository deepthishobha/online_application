<!DOCTYPE html>
<html>
<body>

<h2>Text Formatting Examples in HTML</h2>

<!-- Bold text -->
<p><b>This text is bold.</b></p>

<!-- Italic text -->
<p><i>This text is italic.</i></p>

<!-- Underlined text -->
<p><u>This text is underlined.</u></p>

<!-- Strikethrough -->
<p><strike>This text has a strikethrough.</strike></p>

<!-- Font size and color using <font> tag -->
<p>
  <font size="6" color="red">This is large red text.</font>
</p>

<p>
  <font size="3" color="blue">This is normal blue text.</font>
</p>

<p>
  <font size="1" color="green">This is small green text.</font>
</p>

<!-- Combining styles -->
<p>
  <b><i><font size="5" color="orange">Bold, Italic, Orange text.</font></i></b>
</p>

<!-- Superscript and subscript -->
<p>H<sub>2</sub>O is water, E = mc<sup>2</sup></p>

</body>
</html>
